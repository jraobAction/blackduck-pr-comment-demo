name: Black Duck PR Comment Demo
on:
    push:
      branches: [main, master]
    pull_request:
      branches: [main, master]

jobs:
    blackduck-prcomment:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Black Duck Scan with PR Comments
          uses: blackduck-inc/black-duck-security-scan@v2
          with:
            blackducksca_url: ${{ vars.BLACKDUCK_URL }}
            blackducksca_token: ${{ secrets.BLACKDUCK_API_TOKEN }}

            # blackducksca_prComment_enabled: true

            # blackducksca_fixpr_enabled: true
            # blackducksca_fixpr_maxCount: 5
            # blackducksca_fixpr_filter_severities: 'CRITICAL,HIGH'
            # blackducksca_fixpr_useUpgradeGuidance: 'LONG_TERM'

            blackducksca_scan_full: true
            blackducksca_waitForScan: true
            blackducksca_fixpr_enabled: true
            blackducksca_fixpr_maxCount: 5
            blackducksca_fixpr_filter_severities: 'CRITICAL,HIGH'
            blackducksca_fixpr_useUpgradeGuidance: 'LONG_TERM'

            github_token: ${{ secrets.TOKENACTION }}